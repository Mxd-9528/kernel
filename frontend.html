<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kernel Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets/styles/github-dark.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1em;
    display: flex;
    flex-direction: column;
    gap: 0.5em;
  }
  .msg {
    max-width: 85%;
    padding: 0.5em 0.8em;
    border-radius: 0.5em;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    white-space: pre-wrap;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #2d2d44;
  }
  .msg.assistant p { margin: 0.4em 0; }
  .msg.assistant p:first-child { margin-top: 0; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant code {
    background: #1a1a2e;
    padding: 0.15em 0.35em;
    border-radius: 0.25em;
    font-size: 0.9em;
    font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
  }
  .msg.assistant pre {
    background: #1a1a2e;
    border-radius: 0.4em;
    padding: 0.8em;
    overflow-x: auto;
    margin: 0.5em 0;
  }
  .msg.assistant pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
    line-height: 1.4;
  }
  .msg.assistant ul, .msg.assistant ol {
    padding-left: 1.5em;
    margin: 0.4em 0;
  }
  .msg.assistant blockquote {
    border-left: 3px solid #2563eb;
    padding-left: 0.8em;
    margin: 0.4em 0;
    color: #aaa;
  }
  .msg.assistant table {
    border-collapse: collapse;
    margin: 0.4em 0;
    font-size: 0.9em;
  }
  .msg.assistant th, .msg.assistant td {
    border: 1px solid #444;
    padding: 0.3em 0.6em;
    text-align: left;
  }
  .msg.assistant th { background: #1a1a2e; }
  .msg.system {
    align-self: center;
    font-size: 0.85em;
    color: #888;
    background: none;
    border: 1px solid #333;
    white-space: pre-wrap;
  }
  .msg.thinking {
    align-self: flex-start;
    color: #888;
    font-style: italic;
    background: none;
    white-space: pre-wrap;
  }
  .msg.streaming::after {
    content: "▊";
    animation: cursor-blink 1s step-end infinite;
    color: #2563eb;
  }
  @keyframes cursor-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  #input-area {
    display: flex;
    padding: 0.8em;
    gap: 0.5em;
    border-top: 1px solid #333;
    background: #16213e;
  }
  #input {
    flex: 1;
    padding: 0.6em;
    border: 1px solid #444;
    border-radius: 0.4em;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 0.95em;
    resize: none;
    min-height: 2.5em;
    max-height: 8em;
  }
  #input:focus { outline: none; border-color: #2563eb; }
  #send {
    padding: 0 1.2em;
    border: none;
    border-radius: 0.4em;
    background: #2563eb;
    color: #fff;
    font-size: 0.95em;
    cursor: pointer;
  }
  #send:hover { background: #1d4ed8; }
  #status {
    text-align: center;
    padding: 0.3em;
    font-size: 0.8em;
    color: #666;
  }
</style>
</head>
<body>
<div id="status">连接中...</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
  <button id="send">发送</button>
</div>
<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const statusEl = document.getElementById("status");
  let currentMsg = null;
  let currentPhase = null;

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
  });

  marked.setOptions({ breaks: true, gfm: true });

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => { statusEl.textContent = "已连接"; };
    ws.onclose = () => {
      statusEl.textContent = "连接断开，5 秒后重连...";
      setTimeout(connect, 5000);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      switch (msg.type) {
        case "thinking":
          if (currentPhase !== "thinking") {
            currentMsg = addMsg("thinking", "");
            currentPhase = "thinking";
          }
          currentMsg.textContent += msg.token;
          scrollBottom();
          break;
        case "delta":
          if (currentPhase !== "responding") {
            currentMsg = addMsg("assistant", "");
            currentMsg.classList.add("streaming");
            currentPhase = "responding";
          }
          currentMsg.textContent += msg.token;
          scrollBottom();
          break;
        case "flush":
          if (currentPhase === "responding" && currentMsg) {
            currentMsg.classList.remove("streaming");
            const raw = currentMsg.textContent;
            currentMsg.innerHTML = marked.parse(raw);
            currentMsg.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));
          }
          currentPhase = null;
          break;
        case "display":
          addMsg("system", msg.content);
          scrollBottom();
          break;
      }
    };

    inputEl.onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send(ws);
      }
    };
    document.getElementById("send").onclick = () => send(ws);
  }

  function addMsg(role, content) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = content;
    messagesEl.appendChild(div);
    return div;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function send(ws) {
    const text = inputEl.value.trim();
    if (!text) return;
    if (ws.readyState !== WebSocket.OPEN) return;
    addMsg("user", text);
    scrollBottom();
    ws.send(JSON.stringify({ type: "input", text }));
    inputEl.value = "";
    inputEl.style.height = "auto";
  }

  connect();
</script>
</body>
</html>
